<!DOCTYPE html>

        .price-display {

        }

        .chart-container {

        .indicators-grid {

    <script>
        let stockData = [];
        let priceChart, maChart, volumeChart, macdChart, rsiChart, min15Chart;

        async function fetchRealTimeData() {
            try {
                const response = await fetch('https://push2.eastmoney.com/api/qt/stock/get?secid=1.688256&fields=f43,f44,f45,f46,f47,f48,f49,f50,f51,f52,f55,f57,f58,f60,f170,f171');
                const data = await response.json();
                
                console.log('实时数据API响应:', data);
                
                if (data && data.data) {
                    const stockInfo = data.data;
                    const result = {
                        price: stockInfo.f43 / 100,
                        high: stockInfo.f44 / 100,
                        low: stockInfo.f45 / 100,
                        open: stockInfo.f46 / 100,
                        volume: stockInfo.f47,
                        change: stockInfo.f48 / 100,
                        changePercent: stockInfo.f170 / 100,
                        prevClose: stockInfo.f60 / 100
                    };
                    console.log('解析后的实时数据:', result);
                    return result;
                }
            } catch (error) {
                console.error('获取实时数据失败:', error);
                document.getElementById('statusDot').classList.add('error');
                document.getElementById('apiStatus').textContent = 'API状态: 实时数据获取失败';
            }
            return null;
        }

        async function fetchHistoryData() {
            try {
                const endDate = new Date();
                const startDate = new Date();
                startDate.setDate(startDate.getDate() - 45);
                
                const startStr = startDate.toISOString().split('T')[0].replace(/-/g, '');
                const endStr = endDate.toISOString().split('T')[0].replace(/-/g, '');
                
                const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=1.688256&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57&klt=101&fqt=1&beg=${startStr}&end=${endStr}`;
                
                console.log('请求历史数据URL:', url);
                const response = await fetch(url);
                const data = await response.json();
                
                console.log('历史数据API响应:', data);
                
                if (data && data.data && data.data.klines) {
                    const parsedData = data.data.klines.map(line => {
                        const parts = line.split(',');
                        return {
                            date: parts[0],
                            open: parseFloat(parts[1]),
                            close: parseFloat(parts[2]),
                            high: parseFloat(parts[3]),
                            low: parseFloat(parts[4]),
                            volume: Math.round(parseFloat(parts[5]) / 100),
                            change: parseFloat(parts[6])
                        };
                    });
                    console.log('解析后的历史数据(前5条):', parsedData.slice(0, 5));
                    return parsedData;
                }
            } catch (error) {
                console.error('获取历史数据失败:', error);
                document.getElementById('statusDot').classList.add('error');
                document.getElementById('apiStatus').textContent = 'API状态: 历史数据获取失败';
            }
            return null;
        }

        async function fetch15MinKline() {
            try {
                const endDate = new Date();
                const startDate = new Date();
                startDate.setDate(startDate.getDate() - 5);
                
                const startStr = startDate.toISOString().split('T')[0].replace(/-/g, '');
                const endStr = endDate.toISOString().split('T')[0].replace(/-/g, '');
                
                const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=1.688256&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57&klt=15&fqt=1&beg=${startStr}&end=${endStr}`;
                
                console.log('请求15分钟K线URL:', url);
                const response = await fetch(url);
                const data = await response.json();
                
                console.log('15分钟K线API响应:', data);
                
                if (data && data.data && data.data.klines) {
                    const parsedData = data.data.klines.map(line => {
                        const parts = line.split(',');
                        return {
                            date: parts[0],
                            open: parseFloat(parts[1]),
                            close: parseFloat(parts[2]),
                            high: parseFloat(parts[3]),
                            low: parseFloat(parts[4]),
                            volume: Math.round(parseFloat(parts[5]) / 100),
                            change: parseFloat(parts[6])
                        };
                    });
                    
                    const last3Days = [];
                    const today = new Date();
                    for (let i = 0; i < 3; i++) {
                        const d = new Date(today);
                        d.setDate(d.getDate() - i);
                        const dateStr = d.toISOString().split('T')[0];
                        last3Days.push(dateStr);
                    }
                    
                    const filteredData = parsedData.filter(d => last3Days.some(day => d.date.startsWith(day)));
                    console.log('最近3天15分钟K线数据:', filteredData.length + '条');
                    return filteredData.slice(-48);
                }
            } catch (error) {
                console.error('获取15分钟K线失败:', error);
            }
            return null;
        }

        async function fetchStockData() {
            document.getElementById('currentPrice').textContent = '加载中...';
            
            const historyData = await fetchHistoryData();
            const realTimeData = await fetchRealTimeData();
            
            console.log('历史数据:', historyData ? historyData.length + '条' : 'null');
            console.log('实时数据:', realTimeData);
            
            if (historyData && historyData.length > 0) {
                for (let i = 0; i < historyData.length; i++) {
                    if (i === 0) {
                        historyData[i].changePercent = 0;
                    } else {
                        const prevClose = historyData[i - 1].close;
                        const currentClose = historyData[i].close;
                        historyData[i].changePercent = ((currentClose - prevClose) / prevClose * 100).toFixed(2);
                    }
                }
                
                if (realTimeData) {
                    const today = new Date().toISOString().split('T')[0];
                    const lastHistoryDate = historyData[historyData.length - 1].date;
                    
                    const lastClose = historyData[historyData.length - 1].close;
                    const changePercent = ((realTimeData.price - lastClose) / lastClose * 100).toFixed(2);
                    
                    if (lastHistoryDate !== today) {
                        historyData.push({
                            date: today,
                            open: realTimeData.open,
                            close: realTimeData.price,
                            high: realTimeData.high,
                            low: realTimeData.low,
                            volume: Math.round(realTimeData.volume / 100),
                            changePercent: changePercent
                        });
                    } else {
                        historyData[historyData.length - 1] = {
                            date: today,
                            open: realTimeData.open,
                            close: realTimeData.price,
                            high: realTimeData.high,
                            low: realTimeData.low,
                            volume: Math.round(realTimeData.volume / 100),
                            changePercent: changePercent
                        };
                    }
                }
                
                const result = historyData.slice(-30);
                console.log('最终返回数据(最后5条):', result.slice(-5));
                return result;
            }
            
            console.log('使用模拟数据');
            return generateMockData();
        }

        function generateMockData() {
            const data = [];
            let basePrice = 1000;
            const startDate = new Date();
            startDate.setDate(startDate.getDate() - 35);
            
            for (let i = 0; i < 30; i++) {
                const date = new Date(startDate);
                date.setDate(date.getDate() + i);
                
                if (date.getDay() === 0 || date.getDay() === 6) continue;
                
                const change = (Math.random() - 0.48) * 80;
                const open = basePrice + (Math.random() - 0.5) * 30;
                const close = open + change;
                const high = Math.max(open, close) + Math.random() * 20;
                const low = Math.min(open, close) - Math.random() * 20;
                const volume = Math.floor(Math.random() * 500 + 100);
                
                const changePercent = ((close - basePrice) / basePrice * 100).toFixed(2);
                
                data.push({
                    date: date.toISOString().split('T')[0],
                    open: Math.round(open * 100) / 100,
                    close: Math.round(close * 100) / 100,
                    high: Math.round(high * 100) / 100,
                    low: Math.round(low * 100) / 100,
                    volume: volume,
                    changePercent: changePercent
                });
                
                basePrice = close;
            }
            
            return data;
        }

        function calculateMA(data, period) {
            const result = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    result.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += data[i - j].close;
                    }
                    result.push(Math.round(sum / period * 100) / 100);
                }
            }
            return result;
        }

        function calculateEMA(data, period) {
            const result = [];
            const multiplier = 2 / (period + 1);
            
            for (let i = 0; i < data.length; i++) {
                if (i === 0) {
                    result.push(data[i].close);
                } else {
                    const ema = (data[i].close - result[i - 1]) * multiplier + result[i - 1];
                    result.push(Math.round(ema * 100) / 100);
                }
            }
            return result;
        }

        function calculateMACD(data) {
            const ema12 = calculateEMA(data, 12);
            const ema26 = calculateEMA(data, 26);
            const dif = ema12.map((v, i) => v - ema26[i]);
            
            const dea = [];
            const multiplier = 2 / (10 + 1);
            
            for (let i = 0; i < dif.length; i++) {
                if (i === 0) {
                    dea.push(dif[i]);
                } else {
                    dea.push((dif[i] - dea[i - 1]) * multiplier + dea[i - 1]);
                }
            }
            
            const macd = dif.map((v, i) => Math.round((v - dea[i]) * 2 * 100) / 100);
            
            return { dif, dea, macd };
        }

        function calculateRSI(data, period = 14) {
            const result = [];
            const changes = [];
            
            for (let i = 1; i < data.length; i++) {
                changes.push(data[i].close - data[i - 1].close);
            }
            
            for (let i = 0; i < data.length; i++) {
                if (i < period) {
                    result.push(null);
                } else {
                    let gains = 0, losses = 0;
                    for (let j = i - period; j < i; j++) {
                        if (changes[j] > 0) {
                            gains += changes[j];
                        } else {
                            losses -= changes[j];
                        }
                    }
                    const avgGain = gains / period;
                    const avgLoss = losses / period;
                    const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
                    result.push(Math.round((100 - 100 / (1 + rs)) * 100) / 100);
                }
            }
            
            return result;
        }

        function updateStats() {
            const latest = stockData[stockData.length - 1];
            const previous = stockData[stockData.length - 2];
            const first = stockData[0];
            
            const priceChange = latest.close - previous.close;
            const priceChangePercent = ((priceChange / previous.close) * 100).toFixed(2);
            const monthChange = ((latest.close - first.close) / first.close * 100).toFixed(2);
            
            const isUp = priceChange >= 0;

        function analyzeTechnicalIndicators() {
            if (!stockData || stockData.length < 20) return;
            
            const latest = stockData[stockData.length - 1];
            const previous = stockData[stockData.length - 2];
            
            const highs = stockData.map(d => d.high);
            const lows = stockData.map(d => d.low);
            const closes = stockData.map(d => d.close);
            
            const ma5 = calculateMA(stockData, 5);
            const ma10 = calculateMA(stockData, 10);
            const ma20 = calculateMA(stockData, 20);
            
            const macd = calculateMACD(stockData);
            const rsi = calculateRSI(stockData, 14);
            
            const latestMA5 = ma5[ma5.length - 1];
            const latestMA10 = ma10[ma10.length - 1];
            const latestMA20 = ma20[ma20.length - 1];
            const latestMACD = macd.macd[macd.macd.length - 1];
            const latestDIF = macd.dif[macd.dif.length - 1];
            const latestDEA = macd.dea[macd.dea.length - 1];
            const latestRSI = rsi[rsi.length - 1];
            
            let resistance = Math.max(...highs.slice(-20));
            let support = Math.min(...lows.slice(-20));
            
            const recentHighs = highs.slice(-5);
            const recentLows = lows.slice(-5);
            const avgRecentHigh = recentHighs.reduce((a, b) => a + b, 0) / 5;
            const avgRecentLow = recentLows.reduce((a, b) => a + b, 0) / 5;
            
            resistance = Math.max(resistance, avgRecentHigh * 1.02);
            support = Math.max(support * 0.98, avgRecentLow * 0.98);
            
            if (latestMA5 && latestMA10 && latestMA20) {
                if (latestMA5 > latestMA10 && latestMA10 > latestMA20) {
                    resistance = Math.max(resistance, latestMA5 * 1.03);
                }
                if (latestMA5 < latestMA10 && latestMA10 < latestMA20) {
                    support = Math.min(support, latestMA5 * 0.97);
                }
            }
            
            let advice = '持有';
            let adviceColor = '#f39c12';
            let signals = [];
            
            if (latest.close > latestMA5 && latestMA5 > latestMA10) {
                signals.push('✅ 短期均线多头排列，趋势向上');
            } else if (latest.close < latestMA5 && latestMA5 < latestMA10) {
                signals.push('⚠️ 短期均线空头排列，趋势向下');
            }
            
            if (latestDIF > latestDEA && latestMACD > 0) {
                signals.push('✅ MACD金叉且为正值，上涨动能强');
            } else if (latestDIF < latestDEA && latestMACD < 0) {
                signals.push('⚠️ MACD死叉且为负值，下跌动能强');
            } else if (latestDIF > latestDEA) {
                signals.push('📊 MACD金叉形成，关注后续走势');
            } else if (latestDIF < latestDEA) {
                signals.push('📊 MACD死叉形成，注意风险');
            }
            
            if (latestRSI > 70) {
                signals.push('⚠️ RSI超买区域(>70)，可能面临回调');
            } else if (latestRSI < 30) {
                signals.push('✅ RSI超卖区域(<30)，可能存在反弹机会');
            } else if (latestRSI > 50) {
                signals.push('📊 RSI处于强势区域(50-70)');
            } else {
                signals.push('📊 RSI处于弱势区域(30-50)');
            }
            
            const volumeAvg = stockData.slice(-10).reduce((sum, d) => sum + d.volume, 0) / 10;
            if (latest.volume > volumeAvg * 1.5) {
                signals.push('📈 成交量放大，市场活跃度增加');
            } else if (latest.volume < volumeAvg * 0.5) {
                signals.push('📉 成交量萎缩，市场观望情绪浓厚');
            }
            
            const pricePosition = (latest.close - support) / (resistance - support);
            
            let buyScore = 0;
            let sellScore = 0;
            
            if (latest.close > latestMA5) buyScore += 1;
            else sellScore += 1;
            
            if (latestMA5 > latestMA10) buyScore += 1;
            else sellScore += 1;
            
            if (latestDIF > latestDEA) buyScore += 1;
            else sellScore += 1;
            
            if (latestMACD > 0) buyScore += 1;
            else sellScore += 1;
            
            if (latestRSI < 30) buyScore += 2;
            else if (latestRSI > 70) sellScore += 2;
            else if (latestRSI > 50) buyScore += 1;
            else sellScore += 1;
            
            if (pricePosition < 0.3) buyScore += 1;
            else if (pricePosition > 0.7) sellScore += 1;
            
            if (buyScore >= 5) {
                advice = '买入';
                adviceColor = '#27ae60';
            } else if (sellScore >= 5) {
                advice = '卖出';
                adviceColor = '#e74c3c';
            } else {
                advice = '持有';
                adviceColor = '#f39c12';
            }
            
            document.getElementById('resistanceLevel').textContent = `¥${resistance.toFixed(2)}`;
            document.getElementById('supportLevel').textContent = `¥${support.toFixed(2)}`;
            document.getElementById('currentPriceAnalysis').textContent = `¥${latest.close.toFixed(2)}`;
            
            const adviceEl = document.getElementById('investmentAdvice');
            adviceEl.textContent = advice;
            adviceEl.style.color = adviceColor;
            
            const detailsHTML = `
                <div style="margin-bottom: 15px;">
                    <strong>📊 技术指标分析：</strong>
                    <ul style="margin: 10px 0; padding-left: 20px;">
                        ${signals.map(s => `<li style="margin: 5px 0;">${s}</li>`).join('')}
                    </ul>
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>💰 价格位置分析：</strong>
                    <div style="margin: 10px 0; background: rgba(255,255,255,0.2); border-radius: 5px; height: 20px; position: relative;">
                        <div style="position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); height: 2px; background: rgba(255,255,255,0.5);"></div>
                        <div style="position: absolute; left: ${Math.min(100, Math.max(0, pricePosition * 100))}%; top: 50%; transform: translate(-50%, -50%); width: 16px; height: 16px; background: white; border-radius: 50%;"></div>
                        <div style="position: absolute; left: 0; bottom: -18px; font-size: 12px;">支撑位</div>
                        <div style="position: absolute; right: 0; bottom: -18px; font-size: 12px;">阻力位</div>
                    </div>
                </div>
                <div>
                    <strong>🎯 综合评分：</strong>
                    <span style="margin-left: 10px;">买入信号: ${buyScore}分 | 卖出信号: ${sellScore}分</span>
                </div>
                <div style="margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; font-size: 13px;">
                    <strong>⚠️ 风险提示：</strong>以上分析仅供参考，不构成投资建议。股市有风险，投资需谨慎。
                </div>
            `;
            
            document.getElementById('analysisDetails').innerHTML = detailsHTML;
        }

        function updateDataTable() {
            const tbody = document.getElementById('dataTableBody');
            
            const rows = stockData.slice().reverse().map(d => {
                const changePercent = d.changePercent || 0;
                const changeClass = changePercent >= 0 ? 'up' : 'down';
                const changeSign = changePercent >= 0 ? '+' : '';
                
                return `
                    <tr>
                        <td>${d.date}</td>
                        <td>¥${d.open.toFixed(2)}</td>
                        <td>¥${d.close.toFixed(2)}</td>
                        <td class="up">¥${d.high.toFixed(2)}</td>
                        <td class="down">¥${d.low.toFixed(2)}</td>
                        <td class="${changeClass}">${changeSign}${changePercent}%</td>
                        <td>${d.volume}</td>
                    </tr>
                `;
            }).join('');
            
            tbody.innerHTML = rows;
        }

        async function init() {
            stockData = await fetchStockData();
            
            updateStats();
            createPriceChart();
            createMAChart();
            createVolumeChart();
            createMACDChart();
            createRSIChart();
            create15MinChart();
            analyzeTechnicalIndicators();
            updateDataTable();
            
            document.getElementById('updateTime').textContent = 
                `数据更新时间: ${new Date().toLocaleString('zh-CN')}`;
            
            setInterval(refreshData, 60000);
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            if (btn.classList.contains('loading')) return;
            
            btn.classList.add('loading');
            btn.querySelector('span:last-child').textContent = '刷新中...';
            
            try {
                const newData = await fetchStockData();
                if (newData && newData.length > 0) {
                    stockData = newData;
                    
                    updateStats();
                    updateCharts();
                    updateDataTable();
                    
                    document.getElementById('updateTime').textContent = 
                        `数据更新时间: ${new Date().toLocaleString('zh-CN')}`;
                    
                    document.getElementById('statusDot').classList.remove('error');
                    document.getElementById('apiStatus').textContent = 'API状态: 正常';
                }
            } catch (error) {
                console.error('刷新数据失败:', error);
                document.getElementById('statusDot').classList.add('error');
                document.getElementById('apiStatus').textContent = 'API状态: 异常';
            }
            
            btn.classList.remove('loading');
            btn.querySelector('span:last-child').textContent = '刷新数据';
        }

        function updateCharts() {
            if (priceChart) {
                priceChart.data.labels = stockData.map(d => d.date);
                priceChart.data.datasets[0].data = stockData.map(d => d.close);
                priceChart.update();
            }
            
            if (maChart) {
                const ma5 = calculateMA(stockData, 5);
                const ma10 = calculateMA(stockData, 10);
                const ma20 = calculateMA(stockData, 20);
                
                maChart.data.labels = stockData.map(d => d.date);
                maChart.data.datasets[0].data = ma5;
                maChart.data.datasets[1].data = ma10;
                maChart.data.datasets[2].data = ma20;
                maChart.update();
            }
            
            if (volumeChart) {
                volumeChart.data.labels = stockData.map(d => d.date);
                volumeChart.data.datasets[0].data = stockData.map(d => d.volume);
                volumeChart.update();
            }
            
            if (macdChart) {
                const { dif, dea, macd } = calculateMACD(stockData);
                
                macdChart.data.labels = stockData.map(d => d.date);
                macdChart.data.datasets[0].data = dif;
                macdChart.data.datasets[1].data = dea;
                macdChart.data.datasets[2].data = macd;
                macdChart.update();
            }
            
            if (rsiChart) {
                const rsi = calculateRSI(stockData, 14);
                
                rsiChart.data.labels = stockData.map(d => d.date);
                rsiChart.data.datasets[0].data = rsi;
                rsiChart.update();
            }
        }

        init();
    </script>
